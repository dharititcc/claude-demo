name: Backend CI

on:
  push:
    branches: [main, develop]
    paths: ['backend/**', '.github/workflows/backend-ci.yml']
  pull_request:
    paths: ['backend/**', '.github/workflows/backend-ci.yml']

defaults:
  run:
    working-directory: backend

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: saas_central_test
          MYSQL_ROOT_PASSWORD: secret
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -psecret"
          --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        # pcov, not xdebug: xdebug's coverage carries the step-debugger machinery
        # and roughly triples this already-slow suite. pcov only instruments line
        # coverage, which is all the report needs.
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, intl, pdo_mysql, redis, gd, zip, pcov
          coverage: pcov
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Laravel Pint (code style)
        run: ./vendor/bin/pint --test

      - name: PHPStan (static analysis)
        run: ./vendor/bin/phpstan analyse --no-progress

      # Provisioning a tenant costs ~118 DDL statements, and with the stock
      # settings MySQL fsyncs on each one — that, not the SQL, is what makes the
      # suite slow. This database is a throwaway container that is deleted when
      # the job ends, so durability buys nothing here: if the runner dies, the
      # run is lost either way. Both variables are dynamic and global-scoped.
      #
      # This tuning is CI-only on purpose. Never apply it to a server holding
      # real data — it trades crash-safety for speed.
      #
      # Done through PDO rather than the mysql CLI: pdo_mysql is installed above
      # and therefore guaranteed, whereas the client binary is an incidental of
      # the runner image. A tuning step must not be able to fail the build.
      - name: Tune MySQL for throwaway test data
        run: |
          php -r '
            $pdo = new PDO("mysql:host=127.0.0.1", "root", "secret");
            foreach (["innodb_flush_log_at_trx_commit" => 0, "sync_binlog" => 0] as $var => $val) {
                $pdo->exec("SET GLOBAL {$var} = {$val}");
                $row = $pdo->query("SELECT @@global.{$var}")->fetchColumn();
                echo "{$var} = {$row}\n";
            }
          '

      - name: Central migration check
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_DATABASE: saas_central_test
          DB_USERNAME: root
          DB_PASSWORD: secret
        run: php artisan migrate --force

      # Fast-fail tenant-migration check. Central `migrate` above only touches the
      # central database; the tenant schema lives in database/migrations/tenant/ and
      # only runs when a tenant is provisioned. Creating an organization does exactly
      # that synchronously — TenancyServiceProvider wires TenantCreated →
      # CreateDatabase → MigrateDatabase → SeedDatabase — so this proves the tenant
      # migrations apply cleanly on a fresh tenant DB. The full Pest suite provisions
      # a tenant per test and would catch a broken tenant migration too, but only
      # after the ~90-minute run below; this fails in seconds instead. `tenants:migrate`
      # then confirms the tenant migrations are idempotent against the live tenant DB.
      - name: Tenant migration check
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_DATABASE: saas_central_test
          DB_USERNAME: root
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          # Provisioning enters tenant context, which tags the permission cache per
          # tenant — that requires a taggable store (Redis).
          CACHE_STORE: redis
        run: |
          php artisan tinker --execute="
            \$user = \App\Models\User::firstOrNew(['email' => 'ci-smoke@example.test']);
            \$user->fill(['name' => 'CI Smoke', 'status' => 'active']);
            \$user->password = \Illuminate\Support\Facades\Hash::make('irrelevant-ci-password');
            \$user->email_verified_at = now();
            \$user->save();
            \$tenant = app(\App\Services\OrganizationService::class)->create(\$user, ['name' => 'CI Smoke Org']);
            echo 'provisioned tenant '.\$tenant->id.PHP_EOL;
          "
          php artisan tenants:migrate --force

      # One run, with coverage — not two.
      #
      # This previously ran the whole suite twice: once bare, then again under
      # `--coverage`. The second run re-proved exactly what the first had just
      # proved, for a combined 210-minute budget, and a coverage-only failure
      # could not fail the build anyway because that step was continue-on-error.
      # Coverage instrumentation does not change test outcomes, so the bare run
      # was pure duplication.
      #
      # The suite provisions a real MySQL database per test — that is the point,
      # database-per-tenant cannot be proven on SQLite — so it is slow even so.
      # `--coverage` prints the report; it does not gate.
      #
      # Honest status on the spec's 80% target: it has never been measured. No
      # coverage driver exists in the development environment, so this CI run is
      # the first place a real number can come from. The Stripe billing paths are
      # also deliberately untested (they need live API keys), so the figure will
      # understate covered behaviour. Report first, then set `--min` to the number
      # we actually want to hold — a gate nobody has quantified just fails on the
      # first push and gets switched off.
      - name: Pest tests (with coverage)
        timeout-minutes: 90
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_DATABASE: saas_central_test
          DB_USERNAME: root
          DB_PASSWORD: secret
          REDIS_HOST: 127.0.0.1
          # Redis is required: tenancy tags cache entries per organization, which
          # the file/array drivers cannot do.
          CACHE_STORE: redis
        run: ./vendor/bin/pest --coverage
